<!DOCTYPE html>
<html>
    <head>
        <style>
            .border
            {
                width:450px;
                margin-top:50px;
                display:flex;
                flex-direction: row;
                align-items:top;
            }
            .cat
            {
                height: 50px;
                width:50px;
                border-radius:25px;
                object-fit: cover;
                object-position: center;
            }
            .user-name
            {
                font-weight:bold;
                font-size: 16px;
                color:black;
                font-family: arial;
            }
            .name
            {
                color:gray;
                font-size:16px;
            }
            p{
                font-family: Arial;
                font-size: 18px;
                margin-top: 0px;
                margin-bottom: 0px;
                color:black;
                font-weight:500;
            }
            .info
            {
                margin-left: 10px;
                line-height:25px;
            }
            .source
            {
                display:flex;
                flex-direction: row;
                justify-content:stretch;
                border-style:solid;
                border-width:0.8px;
                border-radius: 10px;
                border-color:rgb(201, 201, 201);
                height:120px;
                margin-top: 15px;
                width:380px;
            }
            .free
            {
                background-color:rgb(221, 224, 228);
                width:190px;
                border-top-left-radius:10px;
                border-bottom-left-radius: 10px;
            }
            .youtube
            {
                color:gray;
                font-size:15px;
            }
            .main
            {
                margin-left: 12px;
                margin-top: 20px;
                margin-bottom: 20px;
            }
        </style>
    </head>
    <body>
        <div class="border">
            <div class="profilepic">
                <img class="cat" src="Images/cat.jpg">
            </div>
            <div class="info">
                <div class="intro">
                    <p><span class="user-name">supersimple.dev</span> <span class="name">@SuperSimpleDev</span></p>
                    <p>What is backend web development? A complete overview. New video is up!</p>
                </div>
                    <div class="source">
                        <div class="free"></div>
                        <div class="main">
                            <p class="youtube">youtube.com</p>
                            <p>Backend web development - a complete overview (2021)</p>
                        </div>
                    </div>
          </div>
        </div>
    </body>
</html>
