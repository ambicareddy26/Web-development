<!DOCTYPE html>
<html>
    <head>

    </head>
    <style>
        body{
            height: 3000px;
        }
        .header
        {
            display:flex;
            position :fixed;
            padding-top:10px;
            padding-left: 50px;
            padding-right: 50px;
            justify-content:space-between;
            left:0px;
            right:0px;
            top:0px;
            align-items: center;
        }
        .leftsection
        {
            display:flex;
            flex-direction: row;
            align-items: center;

        }
        .cat
        {
            width:50px;
            height:50px;
            border-radius:25px;
            margin-right: 10px;
        }
        .name
        {
            font-size:16px;
            font-weight: bold;
        }
        .add
        {
            background-color: blue;
            color:white;
            padding-left: 10px;
            padding-top: 10px;
            padding-bottom: 10px;
            padding-right: 10px;
            border:none;
            border-radius:5px;
            margin-right: 10px;
        }
        .message
        {
            background-color: lightgray;
            color:black;
            padding-left: 15px;
            padding-right:15px;
            padding-top:10px;
            padding-bottom: 10px;
            border:none;
            border-radius: 5px;
        }
    </style>
    <body>
        <div class="header">
            <div class="leftsection">
                    <img class="cat" src="cat2.jpg">
                <div class="name">Oliver Cat</div>
            </div>
            <div>
                <button class="add">
                    Add Friend
                </button>
                <button class="message">
                    Message
                </button>
            </div>
        </div>
    </body>
</html>
