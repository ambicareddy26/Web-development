<!DOCTYPE html>
<html>
    <head>
        <style>
            .flex
            {
                
                display:flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                height:50px;
            }
            .div1
            {
                background-color: lightpink;
                width:100px;
                height:50px;
            }
            .div2
            {
                background-color:lightblue;
                width:200px;
                height:50px;
            }
            .nested
            { 
             display: flex;
             flex-direction: row;
             justify-content:space-between;
            }
            .row2
            {
                background-color: black;
                color:white;
             }
            .row
            {
                justify-content:start;
            }
        </style>
    </head>
    <body>
        <div class="flex">
            <div class="div1"></div>
            <div class="div2"> 
                <div class="row">row1</div>
                <div class="nested">
                    <div class="row2">row2</div>
                    <div class="row2">row2</div>
                </div>
            </div>
        </div>
    </body>
</html>
