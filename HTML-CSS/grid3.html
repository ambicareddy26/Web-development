<!DOCTYPE html>
<html>
  <head>
     <style>
        .grid
        {
          display:grid;
          grid-template-columns:190px 190px 190px;
          column-gap:20px;
          align-items: center;
        }
        .profile-pic
        {
          width:183px;
          height:150px;
        }
        .name
        {
          font-weight: bold;
          font-size:18px;
          margin-top:10px;
          margin-bottom:0px;
          margin-left:7px;
        }
        .profile
        {
          border-color:gray;
          box-shadow:0px 0px 5px rgba(0,0,0,0.3);
          margin-top: 0px;
          margin-bottom: 0px;
          margin-left:7px;
        }
        .mutual-row
        {
          margin-top: 0px;
          display:grid;
          grid-template-columns:25px 1fr;
          align-items: center;
          column-gap: 10px;
          margin-left:10px;
          vertical-align:top;
        }
        .profile2
        {
          height: 30px;
          width:30px;
          border-radius: 17px;
        }
        .friends
        {
          color:gray;
          font-size: 18px;
        }
        .button
        {
          background-color: rgb(86, 86, 236);
          color:white;
          font-weight: bold;
          font-size: medium;
          padding-left: 20px;
          padding-right: 20px;
          padding-bottom: 13px;
          padding-top:13px;
          border:none;
          border-radius:5px;
          margin-bottom: 10px;
          margin-left:10px;
        }
     </style>
  </head>
  <body>
    <div class="grid">
      <div class="profile">
        <img class="profile-pic" src="Images/cat.jpg">
        <p class="name">
          Oliver
        </p>
        <div class="mutual-row">
          <img class="profile2" src="Images/cat1.jpeg">
          <p class="friends">2 mutual friends</p>
        </div>
        <button class="button">
          Add Friend
        </button>
      </div>
      <div class="profile">
        <img class="profile-pic" src="Images/cat1.jpeg">
        <p class="name">
          Mimi
        </p>
        <div class="mutual-row">
          <img class="profile2" src="Images/cat1.jpeg">
          <p class="friends">3 mutual friends</p>
        </div>
        <button class="button">
          Add Friend
        </button>
      </div>
      <div class="profile">
        <img class="profile-pic" src="Images/cat2.jpg">
        <p class="name">
          Rex
        </p>
        <div class="mutual-row">
          <img class="profile2" src="Images/cat1.jpeg">
          <p class="friends">4 mutual friends</p>
        </div>
        <button class="button">
          Add Friend
        </button>
      </div>
    </div>
  </body>
</html>
