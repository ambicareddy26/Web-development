<!DOCTYPE html>
<html>
  <title>Job Application</title>
  <head>

  </head>
  <body>
    <h1>Job Application</h1>
    <form>
      <label for="name">Name:</label>
      <br><br>
      <input type="text" name="Name">
      <br>
  
      <label for="email">Email:</label>
      <br><br>
      <input type="text" name="Email">
      <br>

      <label for="phone">Phone:</label>
      <br><br>
      <input type="tel" name="Phone">
      <br>

      <label for="fileUpload">Resume:</label><br><br>
      <input type="file"><br>

      <label for="experience">Experience(years):</label><br>
      <input type="number" min="0" max="50">

      <fieldset>
        <legend>Skills:</legend>

        <input type="checkbox" id="language" name="language">
        <label for="html">HTML</label>
        <br>

        <input type="checkbox" id="language" name="language">
        <label for="css">CSS</label>
        <br>
        <input type="checkbox" id="language" name="language">
        <label for="js">Java Script</label>
      </fieldset>

      <label for="education">Highest Education:</label>
      <br><br>
      <select name="occupationType">
        <option value="high school" selected>High School</option>
        <option value="graduate">Graduate</option>
        <option value="pg">Post graduate</option>
      </select>
      <br><br>
      
      <fieldset>
        <legend>Availability:</legend>

        <input type="radio" id="radio1" name="workTime">
        <label for="radio1">Full-time</label><br><br>

        <input type="radio" id="radio2" name="workTime">
        <label for="radio2">Part-time</label><br>

      </fieldset>

      <label for="comments">Additional comments:</label>
      <br>
      <textarea id="comments" name="comments" cols="30" rows="10"></textarea><br>

      <input type="submit" value="Submit Application">
    </form>
  </body>
</html>
