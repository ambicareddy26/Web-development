<!DOCTYPE html>
<html>
    <head>
        <style>
            button
            {
                background-color: black;
                color:white;
                font-size: 20px;
                height:36px;
                width:36px;
                border:none;
                border-radius:18px;
                padding:7px;
                top:-13px;
                left:-13px;
                position:absolute;
            }
            body
            {
                height:3000px;
            }
            .thumbnail{
                background-color: gray;
                height: 180px;
                width:320px;
                position:fixed;
                bottom:0px;
                right:0px;
                margin:20px;
            }
            .time
            {
                position:absolute;
                background-color: black;
                color:white;
                bottom: 10px;
                right:10px;
                padding:5px 10px;
            }
        </style>
    </head>
    <body>
        <div class="thumbnail">
            <button>x</button>
            <div class="time">0:29</div>
        </div>
    </body>
</html>
