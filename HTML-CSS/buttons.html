 <!DOCTYPE html>
 <html lang="en">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Details of product</title>
  <style>
    a{
      color: rgb(26, 167, 233);
      font-size:23px;
    }
    a:hover{
      color: red;
    }
    h2{
      color:green;
    }
    p{
      font-size: 23px;
    }
    button{
      padding:12px 20px;
      width:180px;
      font-size: 20px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    button:hover{
      opacity: 0.8;
    }
    button:active{
      opacity: 0.5;
    }
    .add{
      background-color: rgb(236, 240, 36);
    }
    .buy{
      background-color: orange;
    }
  </style>
 </head>
 <body>
  <a href="https://www.amazon.in ">Back to Amazon</a>
  <h1>Nike Black Running Shoes</h1>
  <h2>$39 - in stock</h2>
  <p>Free delivery tomorrow</p>
  <button class="add">Add to cart</button>
  <button class="buy">Buy now</button>
 </body>
 </html>
