<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Span elements</title>
    <style>
        .h1
        {
            font-weight: bolder;
            font-size: xx-large;
        }
        .currency
        {
            color:rgb(96,96,96);
            font-size: medium;
        }
        .today
        {
            font-size: 16px;
            color:green;
        }
        .fall
        {
        color:rgb(207, 5, 5);
        font-size: 16px;
        }
        .hours
        {
            color:rgb(96,96,96);
            font-size:16px
        }
    </style>
</head>
<body>
    <p>
        <span class="h1">1,049.61</span> <span class="currency">USD</span>
    </p>
    <p class="today">
        +18.05(1.75%) today
    </p>
    <p class="hours">
        After hours 1,048.00 <span class="fall">-1.61 (0.15%)</span>
    </p>
</body>
</html>
