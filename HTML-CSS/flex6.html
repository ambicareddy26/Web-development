<!DOCTYPE html>
<html>
    <head>
        <style>
            .flexbox
            {
                display: flex;
                flex-direction: row;
                justify-content: space-between;
                background-color: rgb(131, 53, 167);
                color:white;
                height:53px;
                align-items: center;
                width:730px;
            }
            button{
                background-color:rgb(131, 53, 167);
                color:white;
                font-weight:500;
                font-size:17px;
                border-color: white;
                border-style: solid;
                border-width: 0.5px;
                padding-left: 10px;
                padding-right: 10px;
                padding-top:8px;
                padding-bottom:8px;
                margin-right: 10px;
                border-radius:2px;
            }
            .search-bar
            {
                width:370px;
                padding-left: 20px;
                padding-top: 8px;
                padding-bottom: 8px;
                border-radius:20px;
                border:none;
            }
            .search-bar::placeholder{
                color:gray;
            }
            .div1
            {
                margin-left: 10px;
            }
        </style>
    </head>
    <body>
        <div class="flexbox">
            <div class="div1">
                Home
            </div>
            <div>
                <input class="search-bar" type="text" placeholder="Search">
            </div>
            <div>
                <button>
                    Download
                </button>
            </div>
        </div>
    </body>
</html>
