<!DOCTYPE html>
<html>
  <title>Event registration</title>
  <head>

  </head>
  <body>
    <h1>Event registration</h1>
    <form>
      <label for="name">Name:</label>
      <br><br>
      <input type="text" name="Name">
      <br>
  
      <label for="email">Email:</label>
      <br><br>
      <input type="text" name="Email">
      <br>

      <label for="phone">Phone:</label>
      <br><br>
      <input type="tel" name="Phone">
      <br><br>
      
      <label for="occupationType">Occupation:</label>
      <br><br>
      <select name="occupationType">
        <option value="Student">Student</option>
        <option value="professional">Professional</option>
        <option value="other">Other</option>
      </select>
      <br><br>
      <fieldset>
        <legend>Topics of interest</legend>

        <input type="checkbox" id="language" name="language">
        <label for="html">HTML</label>
        <br>

        <input type="checkbox" id="language" name="language">
        <label for="css">CSS</label>
        <br>
        <input type="checkbox" id="language" name="language">
        <label for="js">Java Script</label>
      </fieldset>
      <label for="comments">Comments:</label>
      <br>
      <textarea name="comments" cols="30" rows="10"></textarea><br>

      <input type="submit" value="Register">
    </form>
  </body>
</html>
