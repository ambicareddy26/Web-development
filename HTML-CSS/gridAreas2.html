<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Areas</title>
  <style>
    body{
      height: 100vh;
      display: grid;
      grid-template-columns: 20% 20% 20% 20% auto;
      grid-template-rows: 15% 40% auto;
      grid-template-areas: "header header header header aside"
                            "box1 box2 box3 box4 aside"
                            "section section article article aside";
    }

    header{
      background-color: orangered;
      grid-area: header;
    }

    aside{
      background-color: blue;
      grid-area: aside;
    }

    .box1{
      background-color: grey;
      grid-area: box1;
    }

    .box2{
      background-color: white;
      grid-area: box2;
    }

    .box3{
      background-color: rgb(152, 103, 243);
      grid-area: box3;
    }

    .box4{
      background-color: orange;
      grid-area: box4;
    }

    section{
      background-color: rgb(0, 128, 100);
      grid-area: section;
    }

    article{
      background-color: skyblue;
      grid-area: article;
    }
  </style>
</head>
<body>
  <header></header>
  <aside></aside>
  <div class="box1"></div>
  <div class="box2"></div>
  <div class="box3"></div>
  <div class="box4"></div>
  <article></article>
  <section></section>
</body>
</html>
